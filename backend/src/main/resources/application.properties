# H2 File-based database (persists data between restarts, no installation needed)
spring.datasource.url=jdbc:h2:file:./data/fintrack;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console (accessible at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

jwt.secret=fintrack-super-secret-jwt-key-2024-hackathon
jwt.expiration=86400000

server.port=8080

spring.jackson.date-format=yyyy-MM-dd
spring.jackson.serialization.write-dates-as-timestamps=false

logging.level.com.fintrack=INFO
